# =============================================================================
# sources.yaml — safe-route data source register for the KS+MO resource directory
# Drafted from docs/04-data-sources.md (catalog verified June 2026).
#
# This file drives the `ingest` pipeline stage AND seeds the `source` table.
# Each entry's fields map 1:1 to db/schema.sql `source` columns, plus ingest
# config (access_lane gating, enabled flag, categories, connector).
#
# HARD RULES (enforced at ingest):
#   * Only entries with enabled=true are pulled.
#   * access_lane=agreement_required or licensed => enabled MUST stay false until
#     an executed agreement is recorded (agreement_ref). Never scrape these.
#   * robots_checked must be true before any automated fetch of a web source.
#   * Every ingested record carries source_url + date_checked + confidence.
#   * Extract facts only; never reproduce copyrighted directory documents.
#
# access_lane:   open | licensed | agreement_required   (-> source.access_route)
# refresh_mode:  live_api | snapshot
# source_type:   gov_open_data | gov_web_page | hsds_211_feed | feeding_america_hsds
#                | findhelp_licensed | context | manual_verify | other
# confidence:    high | medium | low | unverified
# role:          providers (yields directory records) | context (prioritization only)
# categories:    resource buckets this source feeds (food/utility/rent/pet_food/
#                gas_transport/prescription/housing/navigation)
#
# Internal schema standard (not a data source): OpenReferral HSDS 3.0
# (https://docs.openreferral.org). All sources normalize to it.
# =============================================================================

defaults:
  date_checked: "2026-06-24"
  country: US
  states: [KS, MO]

